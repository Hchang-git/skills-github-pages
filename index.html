<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chang's Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.6;
            padding: 0 1rem;
            animation: pageFade 0.8s ease-in-out;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 0;
        }
        .header {
            text-align: center;
            margin-bottom: 5rem;
        }
        .header .greeting {
            font-size: 1.25rem;
            color: #64748b;
            margin-bottom: 0.5rem;
        }
        .header .name {
            font-size: 3rem;
            font-weight: 600;
            color: #2563eb;
            margin-bottom: 1rem;
        }
        .header .desc {
            font-size: 1.1rem;
            color: #475569;
            max-width: 500px;
            margin: 0 auto;
        }
        .posts-title {
            font-size: 1.8rem;
            font-weight: 500;
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .post-card {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .post-card:hover {
            box-shadow: 0 4px 16px rgba(37,99,235,0.1);
            transform: translateY(-2px);
        }
        .post-card .post-date {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.8rem;
        }
        /* 新增：帖子链接样式，去除默认下划线，hover时显示 */
        .post-card .post-link {
            font-size: 1.5rem;
            font-weight: 500;
            color: #2563eb;
            text-decoration: none; /* 去除默认下划线 */
            transition: color 0.2s ease;
        }
        .post-card .post-link:hover {
            color: #1d4ed8; /* hover时颜色加深 */
            text-decoration: underline; /* hover显示下划线 */
        }
        .footer {
            margin-top: 6rem;
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        @keyframes pageFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .container { padding: 2rem 0; }
            .header .name { font-size: 2.2rem; }
            .posts-title { font-size: 1.5rem; }
            .post-card { padding: 1.5rem; }
            .post-card .post-link { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <p class="greeting">Welcome to my blog! Ha!</p>
            <h1 class="name">Chang</h1>
            <p class="desc">nice to meet you. This is my first website. I am excited.</p>
        </header>

        <main>
            <h2 class="posts-title">Posts</h2>
            <div class="post-card">
                <p class="post-date">Mar 6, 2026</p>
                <!-- 核心修复：添加超链接标签，替换href为你原网站的真实链接 -->
                <h3>
                    <a href="2026-03-06-Chang's-home.md" class="post-link">Chang's-home</a>
                </h3>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 Chang's Blog | My First Website</p>
        </footer>
    </div>
</body>
</html>
